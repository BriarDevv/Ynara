# docker-compose para producción
# La DB está en Supabase (fase MVP) → no se incluye en compose.
# Redis sí está self-hosted en la VPS.
# El backend FastAPI corre acá detrás de Cloudflare Tunnel.

services:
  api:
    image: ${DOCKER_REGISTRY}/ynara-backend:latest
    container_name: ynara-api
    restart: unless-stopped
    env_file:
      - ../../apps/backend/.env
    depends_on:
      - redis
    networks:
      - ynara
    # Solo expuesto a Cloudflared, no a internet
    expose:
      - "8080"
    # Liveness: /v1/health no toca DB/Redis (barato). curl ya está en la imagen.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    image: ${DOCKER_REGISTRY}/ynara-backend:latest
    container_name: ynara-worker
    restart: unless-stopped
    command: >
      uv run celery -A app.workers.celery_app worker
      --loglevel=info --concurrency=2
    env_file:
      - ../../apps/backend/.env
    depends_on:
      - redis
    networks:
      - ynara
    # El worker no expone puerto: el ping va por el broker (inspect ping).
    # CMD-SHELL para que $HOSTNAME lo resuelva el contenedor; $$ evita que compose
    # lo interpole. El node default de celery es celery@<hostname>.
    healthcheck:
      test:
        - CMD-SHELL
        - uv run celery -A app.workers.celery_app inspect ping -d celery@$$HOSTNAME
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  beat:
    image: ${DOCKER_REGISTRY}/ynara-backend:latest
    container_name: ynara-beat
    restart: unless-stopped
    # Scheduler de los jobs periódicos definidos en celery_app.beat_schedule
    # (decay_procedural, purge_audit_log, purge_episodic_memory). Va en un
    # servicio APARTE del worker a propósito: con --concurrency=2, meter --beat
    # dentro del worker emitiría cada job una vez por proceso (jobs duplicados).
    # Un único proceso beat garantiza una sola emisión por schedule. SIN beat,
    # los tres jobs no corren nunca: episodios vencidos no se purgan, el
    # procedural no decae (ADR-007 D1) y el audit_log crece sin límite.
    command: >
      uv run celery -A app.workers.celery_app beat
      --loglevel=info --schedule /app/celerybeat/celerybeat-schedule
    env_file:
      - ../../apps/backend/.env
    depends_on:
      - redis
    networks:
      - ynara
    # Schedule persistente entre reinicios: los intervalos largos (audit 30d) no
    # deben reiniciar su contador en cada restart. El dir /app/celerybeat lo crea
    # el Dockerfile con owner appuser, así un volumen NUEVO hereda ese owner. Si
    # actualizás desde un volumen viejo root-owned, recrealo (docker volume rm)
    # para que beat (no-root) pueda escribir.
    volumes:
      - celerybeat-data:/app/celerybeat

  redis:
    image: redis:7-alpine
    container_name: ynara-redis
    restart: unless-stopped
    # requirepass = defensa en profundidad del broker (SEC-001). Redis NO se expone
    # a internet (sin `ports:`, solo la red interna `ynara`), pero exigir auth evita
    # que un contenedor comprometido lea/escriba la cola Celery sin la credencial.
    # La pass se inyecta por env (REDIS_PASSWORD, requerido) y se expande DENTRO del
    # contenedor (`$$` evita que compose la interpole) vía `sh -c`, así no queda
    # horneada en el compose ni visible en `ps`. Los broker URLs de api/worker/beat
    # (REDIS_URL / CELERY_BROKER_URL / CELERY_RESULT_BACKEND en apps/backend/.env)
    # DEBEN incluir la pass: redis://:${REDIS_PASSWORD}@redis:6379/0 (ver infra/prod/README).
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD requerido para el broker (SEC-001)}
    command: >
      sh -c 'exec redis-server --save 60 1 --loglevel warning --maxmemory 512mb
      --maxmemory-policy allkeys-lru --requirepass "$$REDIS_PASSWORD"'
    volumes:
      - redis-data:/data
    networks:
      - ynara
    # Con requirepass, PING sin AUTH devuelve NOAUTH: el healthcheck autentica con
    # -a (--no-auth-warning silencia el aviso de pass en CLI) y exige PONG.
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ynara-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    networks:
      - ynara

  # TODO: agregar vLLM como service cuando levantemos producción.
  # Por ahora vLLM corre fuera del compose, directamente en la VPS
  # con systemd. Ver infra/vllm/.

volumes:
  redis-data:
  celerybeat-data:

networks:
  ynara:
    driver: bridge
