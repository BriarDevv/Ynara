<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ynara — Brand Waves (Light)
  Velo ambiental para fondos light (onboarding, Hoy). "Versión clara" del
  poster de marca: solo glows + ondas, SIN destellos (sparkles).

  Paleta:
    - Glow violet  → #8165A3 (acento alto)
    - Glow blue    → #5C6FB3 (acento bajo izquierdo)
    - Onda alta    → mix #434A82 + #8165A3 (~32% alpha)
    - Onda baja    → mix #2F5AA6 + #5C6FB3 (~30% alpha)

  Densidad calibrada para leerse como VELO (~45% percibido tras el mask
  de fade-top del componente BrandWaves).
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1440 900"
  preserveAspectRatio="xMidYMid slice"
  role="presentation"
  aria-hidden="true"
>
  <defs>
    <radialGradient id="ynw-glow-violet" cx="78%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#8165A3" stop-opacity="0.32" />
      <stop offset="60%" stop-color="#8165A3" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#8165A3" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="ynw-glow-blue" cx="18%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#5C6FB3" stop-opacity="0.22" />
      <stop offset="65%" stop-color="#5C6FB3" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#5C6FB3" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="ynw-wave-a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C6FB3" stop-opacity="0.16" />
      <stop offset="55%" stop-color="#434A82" stop-opacity="0.30" />
      <stop offset="100%" stop-color="#8165A3" stop-opacity="0.26" />
    </linearGradient>

    <linearGradient id="ynw-wave-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2F5AA6" stop-opacity="0.10" />
      <stop offset="50%" stop-color="#5C6FB3" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#434A82" stop-opacity="0.30" />
    </linearGradient>

    <linearGradient id="ynw-wave-c" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8165A3" stop-opacity="0.14" />
      <stop offset="60%" stop-color="#5C6FB3" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#2F5AA6" stop-opacity="0.18" />
    </linearGradient>
  </defs>

  <!-- Glows ambientales — manchas de color difusas detrás de todo. -->
  <rect width="1440" height="900" fill="url(#ynw-glow-blue)" />
  <rect width="1440" height="900" fill="url(#ynw-glow-violet)" />

  <!-- Onda más lejana, alta. -->
  <path
    d="M -40 640 C 220 560 440 720 760 660 C 1080 600 1280 740 1490 670 L 1490 940 L -40 940 Z"
    fill="url(#ynw-wave-c)"
  />

  <!-- Onda media. -->
  <path
    d="M -40 740 C 240 670 480 820 780 760 C 1080 700 1260 820 1490 770 L 1490 940 L -40 940 Z"
    fill="url(#ynw-wave-a)"
  />

  <!-- Onda más cercana, pie de pantalla. -->
  <path
    d="M -40 840 C 260 780 500 900 800 850 C 1100 800 1280 900 1490 870 L 1490 940 L -40 940 Z"
    fill="url(#ynw-wave-b)"
  />
</svg>
