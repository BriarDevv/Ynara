name: CI

on:
  workflow_dispatch:

# CI deshabilitado en push y pull_request hasta que existan los
# lockfiles (pnpm-lock.yaml y apps/backend/uv.lock). Eso pasa cuando
# se corra por primera vez "pnpm install" y "uv sync" (regla #1 de
# AGENTS.md: requieren OK humano).
#
# Una vez generados y commiteados los lockfiles, reactivar push/PR
# reemplazando el bloque "on" por:
#
#   on:
#     pull_request:
#       branches: [main]
#     push:
#       branches: [main]
#
# Mientras tanto, CI se puede correr manualmente desde la pestaña
# Actions del repo (workflow_dispatch).

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-js:
    name: Lint + Typecheck + Test (JS/TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

  lint-and-test-py:
    name: Lint + Test (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

  # TODO: agregar job que falle si detecta @supabase/supabase-js
  # en apps/web o apps/mobile (regla #5 de AGENTS.md).
  # TODO: agregar job que valide formato Conventional Commits en
  # español (regla #6).
