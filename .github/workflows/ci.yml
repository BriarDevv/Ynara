name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Los jobs de lint/test corren SOLO si existen los lockfiles
# correspondientes. En la fase inicial del repo (pre-instalación) los
# lockfiles todavía no existen y los jobs aparecen como "Skipped".
# Una vez que se corra `pnpm install` y `uv sync` (con OK humano por
# regla #1 de AGENTS.md), los lockfiles se commitean y CI empieza a
# correr de verdad.

jobs:
  lint-and-test-js:
    name: Lint + Typecheck + Test (JS/TS)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm biome check .

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

  lint-and-test-py:
    name: Lint + Test (Python)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('apps/backend/uv.lock') != '' }}
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: apps/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest

  # TODO: agregar job que falle si detecta `@supabase/supabase-js`
  # en apps/web o apps/mobile (regla #5 de AGENTS.md).
  # TODO: agregar job que valide formato Conventional Commits en
  # español (regla #6).
