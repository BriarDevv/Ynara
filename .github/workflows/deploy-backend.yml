name: Deploy Backend (Docker → VPS)

on:
  push:
    tags:
      - "backend-v*"
  workflow_dispatch:

# Deploy requiere confirmación humana (regla #1). Por eso este
# workflow se dispara con tags `backend-v*` (creados manualmente) o
# workflow_dispatch.

jobs:
  build-and-push:
    name: Build + push imagen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/ynara-backend:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/ynara-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy a VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.ynara.app
    steps:
      - name: Trigger deploy script en VPS
        run: |
          echo "TODO: SSH a VPS + docker compose pull + up -d"
          echo "Implementar con appleboy/ssh-action o webhook firmado."

